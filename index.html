<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X Foundry - Vinyl Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --bg-card: #12121a;
            --red: #e63946;
            --blue: #4895ef;
            --gold: #d4a574;
            --text: #ffffff;
            --text-muted: #6a6a7a;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        
        .camera-container {
            position: relative;
            width: 100%;
            max-width: 380px;
            aspect-ratio: 1;
            margin: 0 auto;
            border-radius: 20px;
            overflow: hidden;
            background: #0f0f18;
        }
        
        #cameraPreview, #imagePreview {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .camera-frame {
            position: absolute;
            inset: 24px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            pointer-events: none;
        }
        
        .btn {
            padding: 16px 24px;
            border-radius: 12px;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.2s;
            letter-spacing: 0.3px;
        }
        
        .btn-primary {
            background: var(--red);
            color: white;
        }
        
        .btn-secondary {
            background: var(--blue);
            color: white;
        }
        
        .btn-ghost {
            background: transparent;
            border: 1px solid #2a2a35;
            color: var(--text-muted);
        }
        
        .result-card {
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
        }
        
        .cover-square {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
        }
        
        .label-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--gold);
        }
        
        .scan-animation {
            position: absolute;
            left: 24px;
            right: 24px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            animation: scan 2s ease-in-out infinite;
        }
        
        @keyframes scan {
            0%, 100% { top: 24px; }
            50% { top: calc(100% - 24px); }
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 2px solid #2a2a35;
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="sticky top-0 bg-[#0a0a0f]/95 backdrop-blur-sm z-50 border-b border-[#1a1a24]">
        <div class="flex justify-between items-center px-6 py-4">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded bg-[#e63946]"></div>
                <span class="font-medium text-base tracking-wide">X FOUNDRY</span>
            </div>
            <span class="text-xs text-[#6a6a7a]" id="collectionCount">0 records</span>
        </div>
    </header>

    <!-- Main -->
    <section class="py-8 px-5">
        <!-- Camera -->
        <div class="camera-container mb-6" id="cameraContainer">
            <video id="cameraPreview" autoplay playsinline class="hidden"></video>
            <img id="imagePreview" class="hidden w-full h-full object-cover">
            
            <div class="camera-frame"></div>
            <div class="scan-animation hidden" id="scanAnimation"></div>
            
            <div id="placeholder" class="absolute inset-0 flex flex-col items-center justify-center">
                <div class="w-16 h-16 rounded-full bg-[#12121a] mb-4"></div>
                <p class="text-sm text-[#6a6a7a] text-center">Take a photo or upload<br>to identify your vinyl</p>
            </div>
            
            <div id="processingOverlay" class="absolute inset-0 bg-[#0a0a0f]/95 flex flex-col items-center justify-center hidden">
                <div class="spinner mb-4"></div>
                <p class="text-sm font-medium mb-1">Analyzing</p>
                <p class="text-xs text-[#6a6a7a]" id="processStatus">Detecting record...</p>
            </div>
        </div>
        
        <!-- Actions -->
        <div class="space-y-3 mb-8">
            <button onclick="startCamera()" class="btn btn-primary w-full">Take Photo</button>
            <button onclick="document.getElementById('fileInput').click()" class="btn btn-secondary w-full">Upload Image</button>
            <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="handleFileUpload(event)">
            <button onclick="manualSearch()" class="btn btn-ghost w-full">Search Manually</button>
        </div>
        
        <!-- Result -->
        <div id="resultSection" class="hidden mb-8">
            <div class="result-card">
                <img id="resultCover" class="cover-square">
                <div class="p-5">
                    <h3 class="text-lg font-semibold mb-1" id="resultAlbum">Album</h3>
                    <p class="text-sm text-[#6a6a7a] mb-4" id="resultArtist">Artist</p>
                    
                    <div class="flex items-center gap-4 mb-4">
                        <img id="resultLabel" class="label-circle">
                        <div>
                            <p class="text-xs text-[#6a6a7a]">Label</p>
                            <p class="text-sm" id="resultLabelName">—</p>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <div class="bg-[#1a1a24] rounded-lg p-3">
                            <p class="text-xs text-[#6a6a7a]">Year</p>
                            <p class="font-medium" id="resultYear">—</p>
                        </div>
                        <div class="bg-[#1a1a24] rounded-lg p-3">
                            <p class="text-xs text-[#6a6a7a]">Format</p>
                            <p class="font-medium">LP</p>
                        </div>
                    </div>
                    
                    <button onclick="addToCollection()" class="btn btn-primary w-full">Add to Collection</button>
                </div>
            </div>
        </div>
    </section>

    <!-- Collection -->
    <section class="px-5 pb-12">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-base font-medium">Collection</h2>
            <button onclick="openCollection()" class="text-xs text-[#d4a574]">View All</button>
        </div>
        
        <div id="collectionGrid" class="grid grid-cols-3 gap-2">
        </div>
    </section>

    <!-- Modal -->
    <div id="collectionModal" class="fixed inset-0 bg-black/95 hidden z-50 overflow-y-auto">
        <div class="p-5">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-medium">Collection</h2>
                <button onclick="closeCollection()" class="text-[#6a6a7a]">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            
            <div id="fullCollectionGrid" class="grid grid-cols-2 gap-4">
            </div>
        </div>
    </div>

    <script>
        let vinyls = [
            { id: 1, album: "Kind of Blue", artist: "Miles Davis", year: 1959, format: "LP", cover: "https://upload.wikimedia.org/wikipedia/en/9/9c/MilesDavisKindofBlue.jpg", label: "Columbia" }
        ];
        
        let stream = null;

        document.addEventListener('DOMContentLoaded', () => {
            updateCollectionCount();
            renderCollection();
        });

        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                const video = document.getElementById('cameraPreview');
                video.srcObject = stream;
                video.classList.remove('hidden');
                document.getElementById('placeholder').classList.add('hidden');
            } catch (err) {
                alert('Cannot access camera');
            }
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.getElementById('imagePreview');
                    img.src = e.target.result;
                    img.classList.remove('hidden');
                    document.getElementById('cameraPreview').classList.add('hidden');
                    document.getElementById('placeholder').classList.add('hidden');
                    setTimeout(() => processImage(e.target.result), 300);
                };
                reader.readAsDataURL(file);
            }
        }

        async function processImage(imageSrc) {
            document.getElementById('processingOverlay').classList.remove('hidden');
            document.getElementById('scanAnimation').classList.remove('hidden');
            
            const steps = ['Detecting...', 'Analyzing...', 'Searching...', 'Complete'];
            for (let i = 0; i < steps.length; i++) {
                document.getElementById('processStatus').textContent = steps[i];
                await new Promise(r => setTimeout(r, 500));
            }
            
            const mockResults = [
                { album: "Kind of Blue", artist: "Miles Davis", year: 1959, label: "Columbia" },
                { album: "Blue Train", artist: "John Coltrane", year: 1958, label: "Blue Note" },
                { album: "A Love Supreme", artist: "John Coltrane", year: 1965, label: "Impulse!" },
                { album: "Abbey Road", artist: "The Beatles", year: 1969, label: "Apple" },
                { album: "Thriller", artist: "Michael Jackson", year: 1982, label: "Epic" }
            ];
            
            const result = mockResults[Math.floor(Math.random() * mockResults.length)];
            
            cropToSquare(imageSrc, 'resultCover');
            setTimeout(() => cropToCircle(imageSrc, 'resultLabel'), 200);
            
            document.getElementById('resultAlbum').textContent = result.album;
            document.getElementById('resultArtist').textContent = result.artist;
            document.getElementById('resultYear').textContent = result.year;
            document.getElementById('resultLabelName').textContent = result.label;
            
            document.getElementById('processingOverlay').classList.add('hidden');
            document.getElementById('scanAnimation').classList.add('hidden');
            document.getElementById('resultSection').classList.remove('hidden');
            
            if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
        }

        function cropToSquare(src, id) {
            const img = new Image();
            img.onload = () => {
                const c = document.createElement('canvas');
                const ctx = c.getContext('2d');
                const s = Math.min(img.width, img.height);
                c.width = c.height = 400;
                ctx.drawImage(img, (img.width-s)/2, (img.height-s)/2, s, s, 0, 0, 400, 400);
                document.getElementById(id).src = c.toDataURL();
            };
            img.src = src;
        }

        function cropToCircle(src, id) {
            const img = new Image();
            img.onload = () => {
                const c = document.createElement('canvas');
                const ctx = c.getContext('2d');
                const s = Math.min(img.width, img.height);
                c.width = c.height = 100;
                ctx.beginPath();
                ctx.arc(50, 50, 50, 0, Math.PI*2);
                ctx.clip();
                ctx.drawImage(img, (img.width-s)/2, (img.height-s)/2, s, s, 0, 0, 100, 100);
                document.getElementById(id).src = c.toDataURL();
            };
            img.src = src;
        }

        function manualSearch() {
            const q = prompt('Search album or artist:');
            if (!q) return;
            
            document.getElementById('processingOverlay').classList.remove('hidden');
            
            fetch(`https://api.discogs.com/database/search?q=${encodeURIComponent(q)}&type=release&per_page=1`, {
                headers: { 'User-Agent': 'XFoundry/1.0' }
            })
            .then(r => r.json())
            .then(async data => {
                if (data.results?.[0]) {
                    const r = await fetch(`https://api.discogs.com/releases/${data.results[0].id}`, {
                        headers: { 'User-Agent': 'XFoundry/1.0' }
                    }).then(x => x.json());
                    
                    document.getElementById('resultAlbum').textContent = r.title || '';
                    document.getElementById('resultArtist').textContent = r.title?.match(/^(.+?)\s*-/)?.[1] || '';
                    document.getElementById('resultYear').textContent = r.year || '—';
                    document.getElementById('resultLabelName').textContent = r.label?.[0] || '—';
                    
                    if (r.images?.[0]) {
                        cropToSquare(r.images[0].uri, 'resultCover');
                        cropToCircle(r.images[0].uri, 'resultLabel');
                    }
                    
                    document.getElementById('resultSection').classList.remove('hidden');
                } else {
                    alert('No results');
                }
            })
            .catch(() => alert('Search failed'))
            .finally(() => document.getElementById('processingOverlay').classList.add('hidden'));
        }

        function addToCollection() {
            vinyls.push({
                id: Date.now(),
                album: document.getElementById('resultAlbum').textContent,
                artist: document.getElementById('resultArtist').textContent,
                year: document.getElementById('resultYear').textContent,
                format: "LP",
                cover: document.getElementById('resultCover').src,
                label: document.getElementById('resultLabelName').textContent
            });
            
            updateCollectionCount();
            renderCollection();
            alert('Added');
            document.getElementById('resultSection').classList.add('hidden');
            document.getElementById('placeholder').classList.remove('hidden');
        }

        function updateCollectionCount() {
            document.getElementById('collectionCount').textContent = `${vinyls.length} records`;
        }

        function renderCollection() {
            const grid = document.getElementById('collectionGrid');
            const fullGrid = document.getElementById('fullCollectionGrid');
            
            grid.innerHTML = vinyls.slice(0, 6).map(v => `
                <div class="aspect-square bg-[#12121a] rounded-lg overflow-hidden">
                    ${v.cover ? `<img src="${v.cover}" class="w-full h-full object-cover">` : ''}
                </div>
            `).join('');
            
            fullGrid.innerHTML = vinyls.map(v => `
                <div class="result-card">
                    <img src="${v.cover || ''}" class="w-full aspect-square object-cover">
                    <div class="p-3">
                        <h3 class="text-sm font-medium truncate">${v.album}</h3>
                        <p class="text-xs text-[#6a6a7a] truncate">${v.artist}</p>
                    </div>
                </div>
            `).join('');
        }

        function openCollection() { document.getElementById('collectionModal').classList.remove('hidden'); }
        function closeCollection() { document.getElementById('collectionModal').classList.add('hidden'); }
    </script>
</body>
</html>
