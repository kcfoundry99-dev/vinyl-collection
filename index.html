<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X Foundry - Vinyl Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --bg-card: #12121a;
            --red: #e63946;
            --blue: #4895ef;
            --gold: #d4a574;
            --text: #ffffff;
            --text-muted: #8a8a9a;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        
        /* Camera View */
        .camera-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1;
            margin: 0 auto;
            border-radius: 24px;
            overflow: hidden;
            background: #1a1a24;
        }
        
        #cameraPreview {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .camera-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }
        
        .camera-overlay::before {
            content: '';
            position: absolute;
            inset: 20px;
            border: 2px dashed rgba(255,255,255,0.3);
            border-radius: 16px;
        }
        
        .corner-markers {
            position: absolute;
            inset: 30px;
        }
        
        .corner {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 3px solid var(--gold);
        }
        
        .corner.tl { top: 0; left: 0; border-right: none; border-bottom: none; }
        .corner.tr { top: 0; right: 0; border-left: none; border-bottom: none; }
        .corner.bl { bottom: 0; left: 0; border-right: none; border-top: none; }
        .corner.br { bottom: 0; right: 0; border-left: none; border-top: none; }
        
        /* Result Cards */
        .result-card {
            background: var(--bg-card);
            border-radius: 20px;
            overflow: hidden;
        }
        
        .cover-crop {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
        }
        
        .label-crop {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--gold);
        }
        
        .btn-primary {
            background: var(--red);
            color: white;
            padding: 18px 28px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(230, 57, 70, 0.4);
        }
        
        .btn-secondary {
            background: var(--blue);
            color: white;
            padding: 18px 28px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
        }
        
        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(72, 149, 239, 0.4);
        }
        
        .btn-ghost {
            background: transparent;
            color: var(--text-muted);
            padding: 14px 20px;
            border-radius: 12px;
            font-weight: 500;
            font-size: 14px;
            border: 1px solid #2a2a35;
            transition: all 0.2s;
            width: 100%;
        }
        
        .btn-ghost:hover {
            background: #1e1e28;
            color: var(--text);
        }
        
        .scan-line {
            position: absolute;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            animation: scan 2s linear infinite;
        }
        
        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
        
        .processing {
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="sticky top-0 bg-[#0a0a0f]/90 backdrop-blur-md z-50 border-b border-[#1e1e28]">
        <div class="flex justify-between items-center px-6 py-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-lg bg-[#e63946] flex items-center justify-center">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
                        <circle cx="12" cy="12" r="10" fill="#1a1a1a"/>
                        <circle cx="12" cy="12" r="3" fill="#fff"/>
                        <circle cx="12" cy="12" r="1" fill="#000"/>
                    </svg>
                </div>
                <span class="font-semibold text-lg tracking-wide">X FOUNDRY</span>
            </div>
            <div class="text-sm text-[#8a8a9a]" id="collectionCount">0 records</div>
        </div>
    </header>

    <!-- Main Scanner Section -->
    <section class="py-8 px-6">
        <!-- Camera / Upload Area -->
        <div class="camera-container mb-6" id="cameraContainer">
            <video id="cameraPreview" autoplay playsinline class="hidden"></video>
            <img id="imagePreview" class="w-full h-full object-cover hidden">
            <canvas id="processCanvas" class="hidden"></canvas>
            
            <div class="camera-overlay" id="cameraOverlay">
                <div class="corner-markers" id="cornerMarkers">
                    <div class="corner tl"></div>
                    <div class="corner tr"></div>
                    <div class="corner bl"></div>
                    <div class="corner br"></div>
                </div>
                <div class="scan-line hidden" id="scanLine"></div>
            </div>
            
            <!-- Placeholder -->
            <div id="placeholder" class="absolute inset-0 flex flex-col items-center justify-center">
                <div class="w-20 h-20 rounded-full bg-[#1e1e28] flex items-center justify-center mb-4">
                    <svg width="40" height="40" fill="none" stroke="#8a8a9a" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                </div>
                <p class="text-[#8a8a9a] text-center">Take a photo or upload image<br>to identify your vinyl</p>
            </div>
            
            <!-- Processing -->
            <div id="processingOverlay" class="absolute inset-0 bg-[#0a0a0f]/90 flex flex-col items-center justify-center hidden">
                <div class="w-16 h-16 rounded-full border-4 border-[#d4a574] border-t-transparent processing mb-4"></div>
                <p class="text-lg font-semibold mb-2">Analyzing...</p>
                <p class="text-sm text-[#8a8a9a]" id="processStatus">Detecting vinyl record</p>
            </div>
        </div>
        
        <!-- Action Buttons -->
        <div class="space-y-3 mb-8">
            <button onclick="startCamera()" class="btn-primary">
                <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
                📷 Take Photo
            </button>
            
            <button onclick="document.getElementById('fileInput').click()" class="btn-secondary">
                <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                </svg>
                🖼️ Upload Image
            </button>
            <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="handleFileUpload(event)">
            
            <button onclick="manualSearch()" class="btn-ghost">
                🔍 Or Search Manually
            </button>
        </div>
        
        <!-- Result Section -->
        <div id="resultSection" class="hidden">
            <h2 class="text-lg font-semibold mb-4">Identified Record</h2>
            
            <div class="result-card mb-6">
                <!-- Cover Crop -->
                <div class="relative">
                    <img id="resultCover" class="cover-crop">
                    <div class="absolute bottom-3 left-3 bg-black/70 px-3 py-1 rounded-full text-xs">
                        Cover
                    </div>
                </div>
                
                <!-- Info -->
                <div class="p-5">
                    <h3 class="text-xl font-bold mb-1" id="resultAlbum">Album Title</h3>
                    <p class="text-[#8a8a9a] mb-4" id="resultArtist">Artist</p>
                    
                    <!-- Label Crop -->
                    <div class="flex items-center gap-4 mb-4">
                        <img id="resultLabel" class="label-crop" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%231a1a24'/%3E%3Ccircle cx='50' cy='50' r='15' fill='%23d4a574'/%3E%3C/svg%3E">
                        <div>
                            <p class="text-xs text-[#8a8a9a]">Label</p>
                            <p class="text-sm" id="resultLabelName">—</p>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <div class="bg-[#1e1e28] rounded-lg p-3">
                            <p class="text-xs text-[#8a8a9a]">Year</p>
                            <p class="font-semibold" id="resultYear">—</p>
                        </div>
                        <div class="bg-[#1e1e28] rounded-lg p-3">
                            <p class="text-xs text-[#8a8a9a]">Format</p>
                            <p class="font-semibold" id="resultFormat">LP</p>
                        </div>
                    </div>
                    
                    <div class="flex gap-3">
                        <button onclick="addToCollection()" class="btn-primary flex-1">
                            ✓ Add to Collection
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Collection Section -->
    <section class="px-6 pb-12">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-semibold">My Collection</h2>
            <button onclick="openCollection()" class="text-sm text-[#d4a574]">View All →</button>
        </div>
        
        <div id="collectionGrid" class="grid grid-cols-3 gap-3">
        </div>
    </section>

    <!-- Collection Modal -->
    <div id="collectionModal" class="fixed inset-0 bg-black/90 hidden z-50 overflow-y-auto">
        <div class="p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">My Collection</h2>
                <button onclick="closeCollection()" class="text-[#8a8a9a]">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            
            <div id="fullCollectionGrid" class="grid grid-cols-2 gap-4">
            </div>
        </div>
    </div>

    <script>
        let vinyls = [
            {
                id: 1,
                album: "Kind of Blue",
                artist: "Miles Davis",
                year: 1959,
                format: "LP",
                cover: "https://upload.wikimedia.org/wikipedia/en/9/9c/MilesDavisKindofBlue.jpg",
                purchasePrice: 1200,
                currentValue: 4500,
                label: "Columbia"
            }
        ];

        let currentImage = null;
        let stream = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            updateCollectionCount();
            renderCollection();
        });

        // Camera
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                const video = document.getElementById('cameraPreview');
                video.srcObject = stream;
                video.classList.remove('hidden');
                document.getElementById('placeholder').classList.add('hidden');
                document.getElementById('imagePreview').classList.add('hidden');
            } catch (err) {
                alert('無法開啟相機，請選擇上傳圖片');
            }
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
        }

        // File Upload
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.getElementById('imagePreview');
                    img.src = e.target.result;
                    img.classList.remove('hidden');
                    document.getElementById('cameraPreview').classList.add('hidden');
                    document.getElementById('placeholder').classList.add('hidden');
                    currentImage = e.target.result;
                    
                    // Auto process
                    setTimeout(() => processImage(e.target.result), 500);
                };
                reader.readAsDataURL(file);
            }
        }

        // Process Image - Simulate AI Recognition
        async function processImage(imageSrc) {
            document.getElementById('processingOverlay').classList.remove('hidden');
            document.getElementById('scanLine').classList.remove('hidden');
            
            // Simulate AI processing
            const steps = [
                'Detecting vinyl record...',
                'Analyzing cover art...',
                'Identifying label...',
                'Searching database...',
                'Complete!'
            ];
            
            for (let i = 0; i < steps.length; i++) {
                document.getElementById('processStatus').textContent = steps[i];
                await new Promise(r => setTimeout(r, 600));
            }
            
            // Generate result (simulated)
            const mockResults = [
                { album: "Kind of Blue", artist: "Miles Davis", year: 1959, label: "Columbia" },
                { album: "Blue Train", artist: "John Coltrane", year: 1958, label: "Blue Note" },
                { album: "A Love Supreme", artist: "John Coltrane", year: 1965, label: "Impulse!" },
                { album: "Abbey Road", artist: "The Beatles", year: 1969, label: "Apple" },
                { album: "Thriller", artist: "Michael Jackson", year: 1982, label: "Epic" }
            ];
            
            const result = mockResults[Math.floor(Math.random() * mockResults.length)];
            
            // Crop cover to square
            cropToSquare(imageSrc, 'resultCover');
            
            // Generate label (center crop)
            setTimeout(() => {
                cropToCircle(imageSrc, 'resultLabel');
            }, 300);
            
            // Fill info
            document.getElementById('resultAlbum').textContent = result.album;
            document.getElementById('resultArtist').textContent = result.artist;
            document.getElementById('resultYear').textContent = result.year;
            document.getElementById('resultLabelName').textContent = result.label;
            
            document.getElementById('processingOverlay').classList.add('hidden');
            document.getElementById('scanLine').classList.add('hidden');
            document.getElementById('resultSection').classList.remove('hidden');
            
            // Stop camera if running
            stopCamera();
        }

        // Crop to square
        function cropToSquare(imageSrc, targetId) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.getElementById('processCanvas');
                const ctx = canvas.getContext('2d');
                const size = Math.min(img.width, img.height);
                const x = (img.width - size) / 2;
                const y = (img.height - size) / 2;
                
                canvas.width = 400;
                canvas.height = 400;
                ctx.drawImage(img, x, y, size, size, 0, 0, 400, 400);
                
                document.getElementById(targetId).src = canvas.toDataURL();
            };
            img.src = imageSrc;
        }

        // Crop to circle (for label)
        function cropToCircle(imageSrc, targetId) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                const size = Math.min(img.width, img.height);
                const x = (img.width - size) / 2;
                const y = (img.height - size) / 2;
                
                canvas.width = 120;
                canvas.height = 120;
                
                ctx.beginPath();
                ctx.arc(60, 60, 60, 0, Math.PI * 2);
                ctx.closePath();
                ctx.clip();
                
                ctx.drawImage(img, x, y, size, size, 0, 0, 120, 120);
                
                document.getElementById(targetId).src = canvas.toDataURL();
            };
            img.src = imageSrc;
        }

        // Manual Search
        function manualSearch() {
            const searchTerm = prompt('Enter album or artist:');
            if (searchTerm) {
                // Show processing
                document.getElementById('processingOverlay').classList.remove('hidden');
                
                fetch(`https://api.discogs.com/database/search?q=${encodeURIComponent(searchTerm)}&type=release&per_page=1`, {
                    headers: { 'User-Agent': 'XFoundryVinyl/1.0' }
                })
                .then(r => r.json())
                .then(async data => {
                    if (data.results && data.results.length > 0) {
                        const release = await fetch(`https://api.discogs.com/releases/${data.results[0].id}`, {
                            headers: { 'User-Agent': 'XFoundryVinyl/1.0' }
                        }).then(r => r.json());
                        
                        document.getElementById('resultAlbum').textContent = release.title || '';
                        const artistMatch = release.title?.match(/^(.+?)\s*-/);
                        document.getElementById('resultArtist').textContent = artistMatch ? artistMatch[1].trim() : '';
                        document.getElementById('resultYear').textContent = release.year || '—';
                        document.getElementById('resultLabelName').textContent = release.label?.[0] || '—';
                        
                        if (release.images?.[0]) {
                            cropToSquare(release.images[0].uri, 'resultCover');
                            cropToCircle(release.images[0].uri, 'resultLabel');
                        }
                        
                        document.getElementById('resultSection').classList.remove('hidden');
                    } else {
                        alert('No results found');
                    }
                })
                .catch(err => alert('Search failed'))
                .finally(() => {
                    document.getElementById('processingOverlay').classList.add('hidden');
                });
            }
        }

        // Add to Collection
        function addToCollection() {
            const vinyl = {
                id: Date.now(),
                album: document.getElementById('resultAlbum').textContent,
                artist: document.getElementById('resultArtist').textContent,
                year: document.getElementById('resultYear').textContent,
                format: document.getElementById('resultFormat').textContent,
                cover: document.getElementById('resultCover').src,
                label: document.getElementById('resultLabelName').textContent,
                purchasePrice: 0,
                currentValue: 0
            };
            
            vinyls.push(vinyl);
            updateCollectionCount();
            renderCollection();
            
            alert('Added to collection!');
            document.getElementById('resultSection').classList.add('hidden');
            document.getElementById('placeholder').classList.remove('hidden');
        }

        // Collection functions
        function updateCollectionCount() {
            document.getElementById('collectionCount').textContent = `${vinyls.length} records`;
        }

        function renderCollection() {
            const grid = document.getElementById('collectionGrid');
            const fullGrid = document.getElementById('fullCollectionGrid');
            
            const displayVinyls = vinyls.slice(0, 6);
            
            grid.innerHTML = displayVinyls.map(v => `
                <div class="aspect-square bg-[#1e1e28] rounded-lg overflow-hidden">
                    ${v.cover ? 
                        `<img src="${v.cover}" class="w-full h-full object-cover">` : 
                        `<div class="w-full h-full flex items-center justify-center text-2xl">💿</div>`
                    }
                </div>
            `).join('');
            
            fullGrid.innerHTML = vinyls.map(v => `
                <div class="result-card">
                    <img src="${v.cover || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect fill=%22%231e1e28%22 width=%22100%22 height=%22100%22/%3E%3Ctext x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%238a8a9a%22 font-size=%2230%22%3E💿%3C/text%3E%3C/svg%3E'}" class="w-full aspect-square object-cover">
                    <div class="p-3">
                        <h3 class="font-semibold text-sm truncate">${v.album}</h3>
                        <p class="text-xs text-[#8a8a9a] truncate">${v.artist}</p>
                    </div>
                </div>
            `).join('');
        }

        function openCollection() {
            document.getElementById('collectionModal').classList.remove('hidden');
        }

        function closeCollection() {
            document.getElementById('collectionModal').classList.add('hidden');
        }
    </script>
</body>
</html>
