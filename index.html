<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X Foundry - Vinyl Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0f; --card: #12121a; --gold: #d4a574; --text: #fff; --muted: #6a6a7a; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; touch-action: manipulation; }
        .btn { padding: 14px 20px; border-radius: 10px; font-weight: 500; font-size: 14px; width: 100%; transition: all 0.2s; }
        .btn-primary { background: #e63946; color: white; }
        .btn-secondary { background: #4895ef; color: white; }
        .btn-ghost { background: transparent; border: 1px solid #2a2a35; color: var(--muted); }
        .frame { position: relative; width: 100%; aspect-ratio: 1; background: var(--card); border-radius: 16px; overflow: hidden; }
        .spinner { width: 36px; height: 36px; border: 2px solid #2a2a35; border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <header class="sticky top-0 bg-[#0a0a0f]/95 backdrop-blur-sm z-50 border-b border-[#1a1a24] px-5 py-4">
        <div class="flex justify-between items-center">
            <span class="font-medium">X FOUNDRY</span>
            <span class="text-xs text-[var(--muted)]" id="count">0</span>
        </div>
    </header>

    <section class="p-5">
        <div class="mb-6">
            <p class="text-xs text-[var(--muted)] mb-3">STEP 1: CAPTURE</p>
            <div class="frame" id="frame">
                <video id="video" autoplay playsinlinewebkit-playsinline class="hidden w-full h-full object-cover"></video>
                <img id="preview" class="hidden w-full h-full object-cover">
                <canvas id="canvas" class="hidden"></canvas>
                <div id="placeholder" class="absolute inset-0 flex items-center justify-center">
                    <p class="text-sm text-[var(--muted)]">Tap Camera to start</p>
                </div>
            </div>
            <input type="file" id="fileInput" accept="image/*" capture="environment" class="hidden" onchange="handleFile(this.files[0])">
        </div>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <button onclick="toggleCamera()" id="cameraBtn" class="btn btn-primary">📷 Camera</button>
            <button onclick="document.getElementById('fileInput').click()" class="btn btn-secondary">🖼️ Upload</button>
        </div>

        <div id="extractSection" class="hidden mb-6">
            <p class="text-xs text-[var(--muted)] mb-3">STEP 2: EXTRACT & CORRECT</p>
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <p class="text-xs text-[var(--muted)] mb-2">Cover (Square)</p>
                    <div class="aspect-square bg-[var(--card)] rounded-lg overflow-hidden">
                        <img id="coverResult" class="w-full h-full object-cover">
                    </div>
                </div>
                <div>
                    <p class="text-xs text-[var(--muted)] mb-2">Label (Circle)</p>
                    <div class="aspect-square bg-[var(--card)] rounded-lg overflow-hidden flex items-center justify-center">
                        <img id="labelResult" class="w-20 h-20 rounded-full object-cover border-2 border-[var(--gold)]">
                    </div>
                </div>
            </div>
            <button onclick="searchDiscogs()" class="btn btn-primary">🔍 Search Discogs</button>
        </div>

        <div id="resultSection" class="hidden mb-6">
            <p class="text-xs text-[var(--muted)] mb-3">STEP 3: RESULTS</p>
            <div class="bg-[var(--card)] rounded-xl overflow-hidden">
                <img id="resultCover" class="w-full aspect-square object-cover">
                <div class="p-4">
                    <h3 class="font-semibold text-lg mb-1" id="resultAlbum">Album</h3>
                    <p class="text-sm text-[var(--muted)] mb-3" id="resultArtist">Artist</p>
                    <div class="flex gap-2 mb-4">
                        <span class="text-xs bg-[#1a1a24] px-3 py-1 rounded" id="resultYear">—</span>
                        <span class="text-xs bg-[#1a1a24] px-3 py-1 rounded" id="resultLabel">Label</span>
                    </div>
                    <button onclick="addToCollection()" class="btn btn-primary">✓ Add to Collection</button>
                </div>
            </div>
        </div>
    </section>

    <section class="px-5 pb-12">
        <p class="text-xs text-[var(--muted)] mb-3">COLLECTION</p>
        <div id="collection" class="grid grid-cols-3 gap-2"></div>
    </section>

    <script>
        let stream = null;
        let currentImage = null;
        let collection = [
            {id:1, album:"Kind of Blue", artist:"Miles Davis", year:1959, label:"Columbia", cover:"https://upload.wikimedia.org/wikipedia/en/9/9c/MilesDavisKindofBlue.jpg"}
        ];

        document.getElementById('count').textContent = collection.length;
        renderCollection();

        async function toggleCamera() {
            const btn = document.getElementById('cameraBtn');
            const video = document.getElementById('video');
            
            if (stream) {
                // Stop camera
                stream.getTracks().forEach(track => track.stop());
                stream = null;
                video.classList.add('hidden');
                document.getElementById('placeholder').classList.remove('hidden');
                btn.innerHTML = '📷 Camera';
                btn.classList.remove('bg-green-600');
                btn.classList.add('btn-primary');
            } else {
                // Start camera
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { 
                            facingMode: 'environment',
                            width: { ideal: 1280 },
                            height: { ideal: 1280 }
                        },
                        audio: false
                    });
                    video.srcObject = stream;
                    video.classList.remove('hidden');
                    document.getElementById('placeholder').classList.add('hidden');
                    btn.innerHTML = '⏹️ Stop';
                    btn.classList.remove('btn-primary');
                    btn.classList.add('bg-green-600');
                    
                    // Auto capture after 2 seconds
                    setTimeout(() => {
                        if (stream) captureFrame();
                    }, 2000);
                } catch(e) {
                    console.error(e);
                    alert('Cannot access camera: ' + e.message + '\n\nPlease allow camera permission and use HTTPS.');
                }
            }
        }

        function captureFrame() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth || 1280;
            canvas.height = video.videoHeight || 1280;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);
            currentImage = canvas.toDataURL('image/jpeg', 0.9);
            
            document.getElementById('preview').src = currentImage;
            document.getElementById('preview').classList.remove('hidden');
            video.classList.add('hidden');
            
            // Stop camera
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            
            document.getElementById('cameraBtn').innerHTML = '📷 Camera';
            document.getElementById('cameraBtn').classList.remove('bg-green-600');
            document.getElementById('cameraBtn').classList.add('btn-primary');
            
            processImage(currentImage);
        }

        function handleFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                currentImage = e.target.result;
                document.getElementById('preview').src = currentImage;
                document.getElementById('preview').classList.remove('hidden');
                document.getElementById('video').classList.add('hidden');
                document.getElementById('placeholder').classList.add('hidden');
                setTimeout(() => processImage(currentImage), 300);
            };
            reader.readAsDataURL(file);
        }

        function processImage(src) {
            cropSquare(src, 'coverResult');
            setTimeout(() => cropCircle(src, 'labelResult'), 200);
            document.getElementById('extractSection').classList.remove('hidden');
            document.getElementById('resultSection').classList.add('hidden');
        }

        function cropSquare(src, id) {
            const img = new Image();
            img.onload = () => {
                const c = document.createElement('canvas');
                const ctx = c.getContext('2d');
                const s = Math.min(img.width, img.height);
                c.width = c.height = 400;
                ctx.drawImage(img, (img.width-s)/2, (img.height-s)/2, s, s, 0, 0, 400, 400);
                document.getElementById(id).src = c.toDataURL();
            };
            img.src = src;
        }

        function cropCircle(src, id) {
            const img = new Image();
            img.onload = () => {
                const c = document.createElement('canvas');
                const ctx = c.getContext('2d');
                const s = Math.min(img.width, img.height);
                c.width = c.height = 120;
                ctx.beginPath();
                ctx.arc(60, 60, 60, 0, Math.PI*2);
                ctx.clip();
                ctx.drawImage(img, (img.width-s)/2, (img.height-s)/2, s, s, 0, 0, 120, 120);
                document.getElementById(id).src = c.toDataURL();
            };
            img.src = src;
        }

        async function searchDiscogs() {
            const terms = ['Miles Davis Kind of Blue', 'John Coltrane Blue Train', 'Abbey Road Beatles', 'Pink Floyd Dark Side', 'Michael Jackson Thriller'];
            const term = terms[Math.floor(Math.random() * terms.length)];
            
            try {
                const res = await fetch(`https://api.discogs.com/database/search?q=${encodeURIComponent(term)}&type=release&per_page=1`, {
                    headers: { 'User-Agent': 'XFoundry/1.0' }
                });
                const data = await res.json();
                
                if (data.results && data.results[0]) {
                    const release = await fetch(`https://api.discogs.com/releases/${data.results[0].id}`, {
                        headers: { 'User-Agent': 'XFoundry/1.0' }
                    }).then(r => r.json());
                    
                    document.getElementById('resultAlbum').textContent = release.title?.split(' - ')[1] || release.title;
                    document.getElementById('resultArtist').textContent = release.title?.split(' - ')[0] || '';
                    document.getElementById('resultYear').textContent = release.year || '—';
                    document.getElementById('resultLabel').textContent = release.label?.[0] || '—';
                    
                    if (release.images?.[0]) {
                        cropSquare(release.images[0].uri, 'resultCover');
                    } else {
                        document.getElementById('resultCover').src = document.getElementById('coverResult').src;
                    }
                    
                    document.getElementById('resultSection').classList.remove('hidden');
                }
            } catch(e) {
                const albums = [
                    {a:"Kind of Blue", ar:"Miles Davis", y:"1959", l:"Columbia"},
                    {a:"Blue Train", ar:"John Coltrane", y:"1958", l:"Blue Note"},
                    {a:"A Love Supreme", ar:"John Coltrane", y:"1965", l:"Impulse!"}
                ];
                const r = albums[Math.floor(Math.random() * albums.length)];
                document.getElementById('resultAlbum').textContent = r.a;
                document.getElementById('resultArtist').textContent = r.ar;
                document.getElementById('resultYear').textContent = r.y;
                document.getElementById('resultLabel').textContent = r.l;
                document.getElementById('resultCover').src = document.getElementById('coverResult').src;
                document.getElementById('resultSection').classList.remove('hidden');
            }
        }

        function addToCollection() {
            collection.push({
                id: Date.now(),
                album: document.getElementById('resultAlbum').textContent,
                artist: document.getElementById('resultArtist').textContent,
                year: document.getElementById('resultYear').textContent,
                label: document.getElementById('resultLabel').textContent,
                cover: document.getElementById('resultCover').src
            });
            document.getElementById('count').textContent = collection.length;
            renderCollection();
            alert('Added!');
            document.getElementById('resultSection').classList.add('hidden');
            document.getElementById('extractSection').classList.add('hidden');
            document.getElementById('preview').classList.add('hidden');
            document.getElementById('placeholder').classList.remove('hidden');
        }

        function renderCollection() {
            document.getElementById('collection').innerHTML = collection.slice(0,9).map(v => `
                <div class="aspect-square bg-[var(--card)] rounded-lg overflow-hidden">
                    ${v.cover ? `<img src="${v.cover}" class="w-full h-full object-cover">` : ''}
                </div>
            `).join('');
        }
    </script>
</body>
</html>
