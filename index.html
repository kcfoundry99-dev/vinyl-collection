<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X Foundry Vinyl Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .vinyl-card {
            transition: transform 0.2s ease;
        }
        .vinyl-card:hover {
            transform: translateY(-4px);
        }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <!-- Header -->
    <header class="bg-gray-800 border-b border-gray-700 sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="10" fill="#1a1a2e"/>
                            <circle cx="12" cy="12" r="3" fill="#fff"/>
                            <circle cx="12" cy="12" r="1" fill="#000"/>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold">X Foundry Vinyl</h1>
                        <p class="text-xs text-gray-400">黑膠收藏庫</p>
                    </div>
                </div>
                <button onclick="openModal()" class="bg-purple-600 hover:bg-purple-700 px-4 py-2 rounded-lg flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>
                    新增唱片
                </button>
            </div>
        </div>
    </header>

    <!-- Stats -->
    <div class="container mx-auto px-4 py-6">
        <div class="grid grid-cols-3 gap-4 mb-8">
            <div class="bg-gray-800 rounded-xl p-4">
                <div class="text-gray-400 text-sm">總收藏</div>
                <div class="text-2xl font-bold" id="totalCount">0</div>
            </div>
            <div class="bg-gray-800 rounded-xl p-4">
                <div class="text-gray-400 text-sm">藝術家數</div>
                <div class="text-2xl font-bold" id="artistCount">0</div>
            </div>
            <div class="bg-gray-800 rounded-xl p-4">
                <div class="text-gray-400 text-sm">總價值</div>
                <div class="text-2xl font-bold" id="totalValue">$0</div>
            </div>
        </div>

        <!-- Search -->
        <div class="mb-6">
            <input type="text" id="searchInput" placeholder="搜尋唱片、藝術家..." 
                class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-purple-500">
        </div>

        <!-- Collection Grid -->
        <div id="collectionGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
            <!-- Cards will be inserted here -->
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div id="modal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50 p-4">
        <div class="bg-gray-800 rounded-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
            <div class="p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold" id="modalTitle">新增唱片</h2>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-white">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>

                <form id="vinylForm" class="space-y-4">
                    <!-- Cover Image -->
                    <div class="mb-6">
                        <label class="block text-sm text-gray-400 mb-2">專輯封面</label>
                        <div class="flex gap-4">
                            <div id="coverPreview" class="w-32 h-32 bg-gray-700 rounded-lg flex items-center justify-center overflow-hidden">
                                <span class="text-gray-500 text-sm">無圖片</span>
                            </div>
                            <div class="flex-1">
                                <input type="file" id="coverImage" accept="image/*" class="hidden" onchange="previewImage(event)">
                                <label for="coverImage" class="block w-full bg-gray-700 hover:bg-gray-600 text-white py-2 px-4 rounded-lg text-center cursor-pointer mb-2">
                                    上傳圖片
                                </label>
                                <button type="button" onclick="captureWithAI()" class="block w-full bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 text-white py-2 px-4 rounded-lg">
                                    🤖 AI 辨識
                                </button>
                            </div>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm text-gray-400 mb-1">專輯名稱 *</label>
                        <input type="text" id="albumName" required class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-purple-500">
                    </div>

                    <div>
                        <label class="block text-sm text-gray-400 mb-1">藝術家 *</label>
                        <input type="text" id="artistName" required class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-purple-500">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">年份</label>
                            <input type="number" id="releaseYear" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-purple-500">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">格式</label>
                            <select id="format" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-purple-500">
                                <option value="LP">LP</option>
                                <option value="EP">EP</option>
                                <option value="Single">Single</option>
                                <option value="Box Set">Box Set</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">購買價格</label>
                            <input type="number" id="purchasePrice" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-purple-500">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">現在價值</label>
                            <input type="number" id="currentValue" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-purple-500">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm text-gray-400 mb-1">唱片公司</label>
                        <input type="text" id="label" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-purple-500">
                    </div>

                    <div>
                        <label class="block text-sm text-gray-400 mb-1">曲目</label>
                        <textarea id="tracklist" rows="3" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-purple-500" placeholder="每行一首曲目"></textarea>
                    </div>

                    <div>
                        <label class="block text-sm text-gray-400 mb-1">備註</label>
                        <textarea id="notes" rows="2" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-purple-500"></textarea>
                    </div>

                    <div class="flex gap-3 pt-4">
                        <button type="button" onclick="closeModal()" class="flex-1 bg-gray-700 hover:bg-gray-600 py-3 rounded-lg">取消</button>
                        <button type="submit" class="flex-1 bg-purple-600 hover:bg-purple-700 py-3 rounded-lg font-semibold">儲存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Sample data
        let vinyls = [
            {
                id: 1,
                album: "Dark Side of the Moon",
                artist: "Pink Floyd",
                year: 1973,
                format: "LP",
                cover: "https://upload.wikimedia.org/wikipedia/en/3/3b/Dark_Side_of_the_Moon.png",
                purchasePrice: 500,
                currentValue: 2500,
                label: "Harvest Records"
            },
            {
                id: 2,
                album: "Thriller",
                artist: "Michael Jackson",
                year: 1982,
                format: "LP",
                cover: "https://upload.wikimedia.org/wikipedia/en/5/55/Michael_Jackson_-_Thriller.png",
                purchasePrice: 800,
                currentValue: 1800,
                label: "Epic Records"
            },
            {
                id: 3,
                album: "Abbey Road",
                artist: "The Beatles",
                year: 1969,
                format: "LP",
                cover: "https://upload.wikimedia.org/wikipedia/en/4/42/Beatles_-_Abbey_Road.jpg",
                purchasePrice: 600,
                currentValue: 3200,
                label: "Apple Records"
            }
        ];

        let editingId = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderCollection();
            updateStats();
        });

        // Render collection
        function renderCollection(filter = '') {
            const grid = document.getElementById('collectionGrid');
            const filtered = vinyls.filter(v => 
                v.album.toLowerCase().includes(filter.toLowerCase()) ||
                v.artist.toLowerCase().includes(filter.toLowerCase())
            );

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full text-center py-12 text-gray-500">
                        <div class="text-6xl mb-4">💿</div>
                        <p>尚未收藏任何唱片</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = filtered.map(vinyl => `
                <div class="vinyl-card bg-gray-800 rounded-xl overflow-hidden cursor-pointer" onclick="editVinyl(${vinyl.id})">
                    <div class="aspect-square bg-gray-700 relative">
                        ${vinyl.cover ? 
                            `<img src="${vinyl.cover}" class="w-full h-full object-cover">` :
                            `<div class="w-full h-full flex items-center justify-center text-4xl">💿</div>`
                        }
                        <div class="absolute top-2 right-2 bg-black/60 px-2 py-1 rounded text-xs">
                            ${vinyl.format}
                        </div>
                    </div>
                    <div class="p-3">
                        <h3 class="font-semibold text-sm truncate">${vinyl.album}</h3>
                        <p class="text-gray-400 text-sm truncate">${vinyl.artist}</p>
                        <div class="flex justify-between items-center mt-2">
                            <span class="text-gray-500 text-xs">${vinyl.year || '—'}</span>
                            <span class="text-green-400 text-sm">$${vinyl.currentValue || 0}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Update stats
        function updateStats() {
            document.getElementById('totalCount').textContent = vinyls.length;
            document.getElementById('artistCount').textContent = [...new Set(vinyls.map(v => v.artist))].length;
            document.getElementById('totalValue').textContent = '$' + vinyls.reduce((sum, v) => sum + (v.currentValue || 0), 0).toLocaleString();
        }

        // Search
        document.getElementById('searchInput').addEventListener('input', (e) => {
            renderCollection(e.target.value);
        });

        // Modal functions
        function openModal() {
            editingId = null;
            document.getElementById('modalTitle').textContent = '新增唱片';
            document.getElementById('vinylForm').reset();
            document.getElementById('coverPreview').innerHTML = '<span class="text-gray-500 text-sm">無圖片</span>';
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('modal').classList.remove('flex');
        }

        function editVinyl(id) {
            const vinyl = vinyls.find(v => v.id === id);
            if (!vinyl) return;

            editingId = id;
            document.getElementById('modalTitle').textContent = '編輯唱片';
            document.getElementById('albumName').value = vinyl.album;
            document.getElementById('artistName').value = vinyl.artist;
            document.getElementById('releaseYear').value = vinyl.year;
            document.getElementById('format').value = vinyl.format || 'LP';
            document.getElementById('purchasePrice').value = vinyl.purchasePrice;
            document.getElementById('currentValue').value = vinyl.currentValue;
            document.getElementById('label').value = vinyl.label || '';
            document.getElementById('tracklist').value = vinyl.tracklist || '';
            document.getElementById('notes').value = vinyl.notes || '';

            if (vinyl.cover) {
                document.getElementById('coverPreview').innerHTML = `<img src="${vinyl.cover}" class="w-full h-full object-cover">`;
            }

            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
        }

        // Preview image
        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('coverPreview').innerHTML = `<img src="${e.target.result}" class="w-full h-full object-cover">`;
                };
                reader.readAsDataURL(file);
            }
        }

        // AI Capture - 使用 Discogs API 搜尋
        async function captureWithAI() {
            const searchTerm = prompt('請輸入專輯名稱或藝術家名稱進行搜尋：');
            if (!searchTerm) return;

            // 顯示載入中
            const btn = event.target;
            const originalText = btn.innerHTML;
            btn.innerHTML = '搜尋中...';
            btn.disabled = true;

            try {
                const response = await fetch(`https://api.discogs.com/database/search?q=${encodeURIComponent(searchTerm)}&type=release&per_page=5`, {
                    headers: {
                        'User-Agent': 'XFoundryVinyl/1.0'
                    }
                });
                const data = await response.json();

                if (data.results && data.results.length > 0) {
                    // 顯示搜尋結果
                    let resultsText = '找到以下結果：\n\n';
                    data.results.forEach((item, index) => {
                        resultsText += `${index + 1}. ${item.title} (${item.year || '未知年份'})\n`;
                    });
                    resultsText += '\n請輸入編號選擇：';

                    const choice = prompt(resultsText);
                    if (choice && choice >= 1 && choice <= data.results.length) {
                        const selected = data.results[parseInt(choice) - 1];
                        await loadReleaseDetails(selected.id);
                    }
                } else {
                    alert('找不到相關唱片，請嘗試其他關鍵字');
                }
            } catch (error) {
                console.error('Search error:', error);
                alert('搜尋失敗，請稍後再試');
            }

            btn.innerHTML = originalText;
            btn.disabled = false;
        }

        // 取得唱片詳細資訊
        async function loadReleaseDetails(releaseId) {
            try {
                const response = await fetch(`https://api.discogs.com/releases/${releaseId}`, {
                    headers: {
                        'User-Agent': 'XFoundryVinyl/1.0'
                    }
                });
                const data = await response.json();

                // 自動填入表單
                document.getElementById('albumName').value = data.title || '';
                
                // 嘗試解析藝術家名稱
                const artistMatch = data.title.match(/^(.+?)\s*-/);
                document.getElementById('artistName').value = artistMatch ? artistMatch[1].trim() : '';
                
                document.getElementById('releaseYear').value = data.year || '';
                document.getElementById('label').value = data.label?.[0] || '';
                
                // 曲目
                if (data.tracklist) {
                    const tracks = data.tracklist.map(t => t.position + '. ' + t.title).join('\n');
                    document.getElementById('tracklist').value = tracks;
                }

                // 封面圖片
                if (data.images && data.images.length > 0) {
                    document.getElementById('coverPreview').innerHTML = 
                        `<img src="${data.images[0].uri}" class="w-full h-full object-cover">`;
                }

                alert('✅ 已自動填入唱片資訊！');
            } catch (error) {
                console.error('Load details error:', error);
                alert('無法載入詳細資訊');
            }
        }

        // Form submit
        document.getElementById('vinylForm').addEventListener('submit', (e) => {
            e.preventDefault();

            const vinyl = {
                id: editingId || Date.now(),
                album: document.getElementById('albumName').value,
                artist: document.getElementById('artistName').value,
                year: document.getElementById('releaseYear').value,
                format: document.getElementById('format').value,
                purchasePrice: parseFloat(document.getElementById('purchasePrice').value) || 0,
                currentValue: parseFloat(document.getElementById('currentValue').value) || 0,
                label: document.getElementById('label').value,
                tracklist: document.getElementById('tracklist').value,
                notes: document.getElementById('notes').value,
                cover: document.querySelector('#coverPreview img')?.src || ''
            };

            if (editingId) {
                const index = vinyls.findIndex(v => v.id === editingId);
                vinyls[index] = vinyl;
            } else {
                vinyls.push(vinyl);
            }

            closeModal();
            renderCollection();
            updateStats();
        });
    </script>
</body>
</html>
